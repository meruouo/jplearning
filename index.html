// Google TTS
async function speak(text) {
  return speakAs(text, 'female');
}

async function speakAs(text, voiceType = 'female') {
  const cleanText = text.replace(/\(.*?\)/g, '').replace(/（.*?）/g, '');
  const cacheKey = `${voiceType}_${cleanText}`;
  
  const voices = {
    female: { name: 'ja-JP-Wavenet-A', gender: 'FEMALE' },
    male: { name: 'ja-JP-Wavenet-C', gender: 'MALE' }
  };
  
  const voice = voices[voiceType] || voices.female;
  
  if (audioCache[cacheKey]) {
    return new Promise(resolve => {
      audioCache[cacheKey].onended = resolve;
      audioCache[cacheKey].currentTime = 0;
      audioCache[cacheKey].play();
    });
  }
  
  try {
    const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text: cleanText },
        voice: { languageCode: 'ja-JP', name: voice.name, ssmlGender: voice.gender },
        audioConfig: { audioEncoding: 'MP3', speakingRate: 0.9, pitch: 0 }
      })
    });
    
    const data = await response.json();
    
    if (data.audioContent) {
      return new Promise(resolve => {
        const audio = new Audio('data:audio/mp3;base64,' + data.audioContent);
        audio.onended = resolve;
        audioCache[cacheKey] = audio;
        audio.play();
      });
    }
  } catch (error) {
    console.error('TTS error:', error);
  }
}

async function speakDialogue(parts) {
  for (let i = 0; i < parts.length; i++) {
    await speakAs(parts[i].text, parts[i].voice || 'female');
    if (i < parts.length - 1) {
      await new Promise(resolve => setTimeout(resolve, 500));
    }
  }
}

function startRandomPractice() {
  const d = curriculum[currentDay];
  const randomIdx = Math.floor(Math.random() * d.vocabulary.length);
  currentRandomWord = d.vocabulary[randomIdx];
  currentRandomIndex = randomIdx;
  
  document.getElementById('random-word-display').textContent = currentRandomWord.word;
  document.getElementById('random-practice-input').value = '';
  document.getElementById('practice-feedback').innerHTML = '';
  document.getElementById('random-practice-input').focus();
}

function checkRandomPractice() {
  if (!currentRandomWord) return;
  
  const input = document.getElementById('random-practice-input').value.trim();
  const feedback = document.getElementById('practice-feedback');
  
  if (input === currentRandomWord.kana) {
    feedback.innerHTML = `<div style="color: #90ee90;">✓ 正確! ${currentRandomWord.meaning}</div>`;
  } else {
    feedback.innerHTML = `<div style="color: #ff6666;">✗ 正確答案: ${currentRandomWord.kana} (${currentRandomWord.meaning})</div>`;
  }
}

function selectGrammarQ(q, opt) {
  grammarAnswers[q] = opt;
  document.querySelectorAll(`[data-gq="${q}"] .option`).forEach((el, i) => {
    el.classList.remove('selected');
    if (i === opt) el.classList.add('selected');
  });
}

function submitGrammarTest() {
  const d = curriculum[currentDay];
  let correct = 0;
  
  d.grammarTest.forEach((test, i) => {
    const opts = document.querySelectorAll(`[data-gq="${i}"] .option`);
    const hint = document.getElementById(`gh-${i}`);
    
    opts.forEach((el, j) => {
      if (j === test.correct) el.classList.add('correct');
      if (grammarAnswers[i] === j && j !== test.correct) el.classList.add('wrong');
    });
    
    if (grammarAnswers[i] === test.correct) {
      correct++;
      hint.innerHTML = `<div style="color: #639922;">✓ 正確!</div>`;
    } else {
      hint.innerHTML = `<div style="color: #e24b4a;">✗ ${test.explain}</div>`;
    }
    hint.classList.add('show');
  });
  
  const pct = Math.round((correct / 3) * 100);
  document.getElementById('grammar-result').innerHTML = `<div class="result">答對 ${correct}/3 題 (${pct}%)</div>`;
  document.getElementById('submit-grammar').disabled = true;
}

function selectListening(task, opt) {
  listeningAnswers[task] = opt;
  document.querySelectorAll(`[data-task="${task}"] .option`).forEach((el, i) => {
    el.classList.remove('selected');
    if (i === opt) el.classList.add('selected');
  });
}

async function playTask1() {
  const d = curriculum[currentDay].listening.task1;
  await speakDialogue(d.dialogue);
}

function submitListening() {
  const d = curriculum[currentDay].listening;
  let correct = 0;
  let total = 0;

  // Task 1
  const t1opts = document.querySelectorAll('[data-task="task1"] .option');
  t1opts.forEach((el, i) => {
    if (i === d.task1.correct) el.classList.add('correct');
    if (listeningAnswers.task1 === i && i !== d.task1.correct) el.classList.add('wrong');
  });
  if (listeningAnswers.task1 === d.task1.correct) {
    correct++;
  } else if (listeningAnswers.task1 !== null) {
    const task = t1opts[0].closest('.task');
    const hint = document.createElement('div');
    hint.style.cssText = 'color: #e24b4a; margin-top: 1rem; padding: 0.75rem; background: #fcebeb; border-radius: 8px; font-size: 14px;';
    hint.innerHTML = `✗ ${d.task1.explain}`;
    task.appendChild(hint);
  }
  total++;

  // Task 2
  const t2 = document.getElementById('task2-input');
  const t2h = document.getElementById('task2-hint');
  if (t2.value.trim() === d.task2.answer) {
    t2.classList.add('correct');
    t2h.innerHTML = '<div style="color: #639922;">✓ 正確!</div>';
    correct++;
  } else {
    t2.classList.add('wrong');
    t2h.innerHTML = `<div style="color: #e24b4a;">✗ ${d.task2.explain}<br>正確答案: ${d.task2.answer}</div>`;
  }
  t2h.classList.add('show');
  total++;

  const pct = Math.round((correct / total) * 100);
  document.getElementById('listening-result').innerHTML = `<div class="result">答對 ${correct}/${total} 題 (${pct}%)</div>`;
  document.getElementById('submit-listening').disabled = true;
}

function selectReading(q, opt) {
  readingAnswers[q] = opt;
  document.querySelectorAll(`[data-rq="${q}"] .option`).forEach((el, i) => {
    el.classList.remove('selected');
    if (i === opt) el.classList.add('selected');
  });
}

function submitReading() {
  const d = curriculum[currentDay].reading;
  let correct = 0;
  
  d.questions.forEach((q, i) => {
    const opts = document.querySelectorAll(`[data-rq="${i}"] .option`);
    const qbox = opts[0].closest('.question-box');
    
    opts.forEach((el, j) => {
      if (j === q.correct) el.classList.add('correct');
      if (readingAnswers[i] === j && j !== q.correct) el.classList.add('wrong');
    });
    
    if (readingAnswers[i] === q.correct) {
      correct++;
    } else if (readingAnswers[i] !== null) {
      const hint = document.createElement('div');
      hint.style.cssText = 'color: #e24b4a; margin-top: 0.75rem; padding: 0.75rem; background: #fcebeb; border-radius: 8px; font-size: 14px;';
      hint.innerHTML = `✗ ${q.explain}`;
      qbox.appendChild(hint);
    }
  });

  const pct = Math.round((correct / 2) * 100);
  document.getElementById('reading-result').innerHTML = `<div class="result">答對 ${correct}/2 題 (${pct}%)</div>`;
  document.getElementById('submit-reading').disabled = true;
}

function renderContent() {
  const d = curriculum[currentDay];
  if (!d) {
    document.getElementById('content').innerHTML = '<div class="section"><h2>此天數內容尚未完成</h2></div>';
    return;
  }
  
  document.getElementById('currentDay').textContent = currentDay;
  document.getElementById('progress').textContent = (currentDay * 10) + '%';
  
  listeningAnswers = {};
  readingAnswers = {};
  grammarAnswers = {};
  
  let html = `
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="
        font-size: 36px; 
        font-weight: 700; 
        margin-bottom: 0.5rem; 
        background: linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #ff4444 100%); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        background-clip: text;
        text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        filter: drop-shadow(0 2px 8px rgba(255, 68, 68, 0.6));
        letter-spacing: 2px;
      ">🔥 17の日本語学習 🔥</h1>
      <p style="
        font-size: 16px; 
        color: #ff4444; 
        font-weight: 600;
        text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        margin-bottom: 0.25rem;
      ">背不起來都下地獄</p>
      <p style="font-size: 13px; color: #c9a962; margin-top: 0.5rem;">${d.title}</p>
    </div>
    
    <div class="section" id="grammar">
      <h2 class="section-title">🔥 文法 (${d.grammar.length}個)</h2>
      ${d.grammar.map(g => `
        <div class="grammar-item">
          <div class="grammar-title">${g.pattern}</div>
          <div class="meaning">${g.meaning}</div>
          ${g.examples.map(ex => `
            <div class="example">
              <div class="example-content">
                <div class="example-ja">${ex.ja}</div>
                <div class="example-kana">${ex.kana}</div>
                <div class="example-zh">${ex.zh}</div>
              </div>
              <button class="play-btn" onclick="speak('${ex.ja}')">▶</button>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>

    <div class="section" id="vocab">
      <div class="header-row">
        <h2 class="section-title" style="margin: 0;">💀 單字 (${d.vocabulary.length}個)</h2>
        <button class="btn" id="toggleKanaBtn" onclick="toggleAllKana()">🙈 隱藏</button>
      </div>
      
      <div class="random-practice">
        <div style="font-size: 14px; color: #c9a962; margin-bottom: 1rem; text-align: center;">💀 隨機單字練習</div>
        <div class="random-word-display" id="random-word-display">點擊「開始」抽單字</div>
        <input type="text" class="practice-input-large" id="random-practice-input" placeholder="輸入平假名" />
        <div class="practice-feedback" id="practice-feedback"></div>
        <div class="practice-buttons">
          <button class="btn" onclick="startRandomPractice()">🎲 開始/下一個</button>
          <button class="btn" onclick="checkRandomPractice()">✓ 檢查</button>
        </div>
      </div>
      
      <div class="vocab-grid">
        ${d.vocabulary.map((v, i) => `
          <div class="vocab-card">
            <div class="vocab-content">
              <div class="vocab-word">${v.word}</div>
              <div class="vocab-kana" id="kana-${i}" onclick="toggleKana(${i})">${v.kana}</div>
              <div class="vocab-type">${v.type}</div>
              <div class="vocab-meaning">${v.meaning}</div>
              <div class="vocab-ex">${v.ex}</div>
              <div class="vocab-ex-zh">${v.exZh}</div>
            </div>
            <button class="play-btn" onclick="speak('${v.word}')">▶</button>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section" id="phrases">
      <h2 class="section-title">🩸 片語 (${d.phrases.length}個)</h2>
      ${d.phrases.map(p => `
        <div class="phrase-item">
          <div class="phrase-content">
            <div class="phrase-ja">${p.ja}</div>
            <div class="phrase-meaning">${p.meaning}</div>
            <div class="phrase-ex">${p.ex}</div>
            <div class="phrase-ex-zh">${p.exZh}</div>
          </div>
          <button class="play-btn" onclick="speak('${p.ja}')">▶</button>
        </div>
      `).join('')}
    </div>

    <div style="height: 60px; display: flex; align-items: center; margin: 3rem 0 2rem;">
      <div style="flex: 1; height: 2px; background: linear-gradient(to right, transparent, #8b0000, transparent);"></div>
      <div style="padding: 0 2rem; font-size: 16px; font-weight: 600; color: #ff4444;">⚔️ 試煉區</div>
      <div style="flex: 1; height: 2px; background: linear-gradient(to right, transparent, #8b0000, transparent);"></div>
    </div>

    <div class="section" id="grammar-test">
      <h2 class="section-title">⚔️ 文法測驗 (3題)</h2>
      ${d.grammarTest.map((t, i) => `
        <div class="question-box">
          <div class="question-text">${i + 1}. ${t.q}</div>
          <div class="options" data-gq="${i}">
            ${t.opts.map((opt, j) => `
              <div class="option" onclick="selectGrammarQ(${i}, ${j})">${j + 1}. ${opt}</div>
            `).join('')}
          </div>
          <div class="answer-hint" id="gh-${i}"></div>
        </div>
      `).join('')}
      <button class="submit-btn" id="submit-grammar" onclick="submitGrammarTest()">提交答案</button>
      <div id="grammar-result"></div>
    </div>

    <div class="section" id="listening">
      <h2 class="section-title">👂 聽力測驗</h2>
      
      <div class="task" data-task="task1">
        <div class="task-type">課題理解</div>
        <div class="task-instruction">聽對話和問題,選出最適合的答案</div>
        <div class="audio-controls">
          <button class="play-btn" onclick="playTask1()">▶ 播放對話</button>
          <button class="play-btn" onclick="speak('${d.listening.task1.question}')">▶ 播放問題</button>
        </div>
        <div class="question-box">
          <div class="question-text">${d.listening.task1.question}</div>
          <div class="options">
            ${d.listening.task1.options.map((opt, i) => `
              <div class="option" onclick="selectListening('task1', ${i})">${i + 1}. ${opt}</div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="task">
        <div class="task-type">填空練習</div>
        <div class="task-instruction">聽音檔,填入缺少的單字</div>
        <div class="audio-controls">
          <button class="play-btn" onclick="speak('${d.listening.task2.audio}')">▶ 播放音檔</button>
        </div>
        <div class="question-box">
          <div class="question-text">${d.listening.task2.text}</div>
          <input type="text" class="fill-input" id="task2-input" placeholder="填入缺少的單字" />
          <div class="answer-hint" id="task2-hint"></div>
        </div>
      </div>

      <button class="submit-btn" id="submit-listening" onclick="submitListening()">提交答案</button>
      <div id="listening-result"></div>
    </div>

    <div class="section" id="reading">
      <h2 class="section-title">📜 閱讀理解</h2>
      <div class="passage">${d.reading.passage}</div>
      ${d.reading.questions.map((q, i) => `
        <div class="question-box" data-rq="${i}">
          <div class="question-text">${i + 1}. ${q.q}</div>
          <div class="options">
            ${q.opts.map((opt, j) => `
              <div class="option" onclick="selectReading(${i}, ${j})">${j + 1}. ${opt}</div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <button class="submit-btn" id="submit-reading" onclick="submitReading()">提交答案</button>
      <div id="reading-result"></div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

renderContent();
</script>

</body>
</html>
